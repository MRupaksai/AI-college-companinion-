<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="2;url=http://localhost:3000" />
  <title>AI College Companion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(135deg, #0b1120 0%, #1e1b4b 50%, #0f172a 100%);
      color: #f1f5f9;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: rgba(30, 41, 59, 0.85);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    h1 {
      font-size: 1.75rem;
      background: linear-gradient(90deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; margin-bottom: 24px; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #334155;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a.btn {
      display: inline-block;
      background: #4f46e5;
      color: white;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s;
    }
    a.btn:hover { background: #6366f1; }
    .hint {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #64748b;
    }
    code {
      background: #0f172a;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎓</div>
    <h1>AI College Companion</h1>
    <p>Opening your academic assistant…</p>
    <div class="spinner"></div>
    <a class="btn" href="http://localhost:3000">Open App Now</a>
    <p class="hint">
      If the app doesn’t load, start the server first:<br />
      <code>npm run dev</code>
    </p>
  </div>
  <script>
    setTimeout(function () {
      window.location.href = "http://localhost:3000";
    }, 1500);
  </script>
</body>
</html>
